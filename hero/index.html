<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Element Heroes</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Element Heroes</h1>

<div id="lobby">

<button id="createGame">Create Game</button>

<div>
<input id="roomInput" placeholder="Room Code">
<button id="joinGame">Join Game</button>
</div>

</div>


<div id="game" style="display:none">

<h2 id="roomCode"></h2>

<div class="board">

<div class="enemy">
<h3>Opponent</h3>
HP: <span id="enemyHP"></span>
<div id="enemyField"></div>
</div>

<div class="center">

<div class="log" id="log"></div>

<button onclick="endTurn()">End Turn</button>
<button onclick="restartMatch()">Restart</button>

</div>

<div class="player">

<h3>You</h3>

HP: <span id="myHP"></span>
Energy: <span id="energy"></span>

<div id="myField"></div>

<h3>Your Hand</h3>
<div id="hand"></div>

</div>

</div>

</div>

<script src="game.js"></script>

</body>
</html>
