<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Element Heroes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

  <!-- Enemy -->
  <section class="player-area enemy">
    <div class="player-info">Enemy | HP: <span id="enemy-hp">20</span></div>
    <div class="field" id="enemy-field"></div>
  </section>

  <!-- Status -->
  <div class="status-bar">
    <span id="turn-indicator">Your Turn</span>
  </div>

  <!-- Player -->
  <section class="player-area player">
    <div class="player-info">You | HP: <span id="player-hp">20</span></div>
    <div class="field" id="player-field"></div>

    <!-- Actions near hand -->
    <div class="action-row">
      <button id="play-btn">Play</button>
      <button id="end-turn-btn">End Turn</button>
      <button id="clear-btn">Clear</button>
    </div>

    <!-- Hand -->
    <div class="hand" id="hand"></div>
  </section>

  <!-- Right log -->
  <aside class="log-panel">
    <h3>Log</h3>
    <div id="log"></div>
  </aside>

</div>

<script src="game.js"></script>
</body>
</html>
