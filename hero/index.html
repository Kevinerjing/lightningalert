<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Element Hero Intro</title>
<style>
  :root{
    --bg1:#02040a;
    --bg2:#071525;
    --cyan: #73e9ff;
    --cyan2:#2bbcff;
    --green:#8cff4f;
    --green2:#37ff9f;
    --whiteGlow: rgba(255,255,255,.9);
  }
  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at 50% 50%, rgba(34,105,150,.18), transparent 28%),
      radial-gradient(circle at 20% 20%, rgba(77,154,255,.09), transparent 24%),
      radial-gradient(circle at 80% 30%, rgba(94,255,189,.08), transparent 26%),
      linear-gradient(180deg,var(--bg2),var(--bg1) 70%);
    font-family: Arial, Helvetica, sans-serif;
  }

  #intro{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    background:
      radial-gradient(circle at center, rgba(116,208,255,.08), transparent 20%),
      radial-gradient(circle at center, rgba(140,255,79,.06), transparent 30%);
  }

  canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
  }

  .vortex{
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:0;
    transition:opacity .7s ease;
    mix-blend-mode:screen;
    background:
      radial-gradient(circle at 50% 50%, rgba(147,240,255,.18), transparent 14%),
      conic-gradient(from 0deg at 50% 50%,
        transparent 0deg,
        rgba(130,230,255,.0) 20deg,
        rgba(160,245,255,.18) 58deg,
        rgba(255,255,255,.06) 88deg,
        transparent 122deg,
        rgba(157,255,211,.14) 180deg,
        transparent 230deg,
        rgba(130,230,255,.16) 300deg,
        transparent 360deg);
    filter: blur(10px);
    animation: spin 7s linear infinite;
  }
  .vortex.show{opacity:1}
  .vortex::before,
  .vortex::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:72vmin;
    height:72vmin;
    border-radius:50%;
    transform:translate(-50%,-50%);
    border:1px solid rgba(140,235,255,.15);
    box-shadow:
      0 0 80px rgba(115,233,255,.12) inset,
      0 0 30px rgba(115,233,255,.08);
  }
  .vortex::after{
    width:46vmin;
    height:46vmin;
    border-color: rgba(136,255,168,.18);
    animation: spinReverse 5s linear infinite;
  }

  .hero{
    position:absolute;
    top:50%;
    width:min(32vw, 370px);
    max-height:76vh;
    object-fit:contain;
    transform:translate(-50%,-50%) scale(.82);
    opacity:0;
    filter: drop-shadow(0 0 36px rgba(255,255,255,.18));
    transition:
      left 1.15s cubic-bezier(.22,.9,.22,1),
      transform .9s ease,
      opacity .55s ease,
      filter .8s ease;
    z-index:3;
    pointer-events:none;
    user-select:none;
  }
  #sodium{
    left:23%;
  }
  #chlorine{
    left:77%;
    filter: drop-shadow(0 0 36px rgba(100,255,150,.25));
  }
  .hero.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
  }
  .hero.converge{
    left:50% !important;
    transform:translate(-50%,-50%) scale(.70);
  }

  #energyCore{
    position:absolute;
    left:50%;
    top:50%;
    width:16vmin;
    height:16vmin;
    transform:translate(-50%,-50%) scale(.3);
    border-radius:50%;
    opacity:0;
    z-index:2;
    pointer-events:none;
    background:
      radial-gradient(circle at 50% 50%, rgba(255,255,255,.95) 0 14%, rgba(160,241,255,.95) 20%, rgba(82,193,255,.55) 42%, rgba(79,255,170,.18) 62%, transparent 72%);
    box-shadow:
      0 0 24px rgba(255,255,255,.8),
      0 0 80px rgba(115,233,255,.45),
      0 0 120px rgba(70,255,170,.18);
    transition:opacity .45s ease, transform .8s ease;
  }
  #energyCore.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1.25);
  }
  #energyCore.flash{
    transform:translate(-50%,-50%) scale(2.6);
    opacity:.98;
  }

  #flash{
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at center, rgba(255,255,255,.98), rgba(165,236,255,.68) 18%, rgba(255,255,255,0) 42%);
    opacity:0;
    pointer-events:none;
    z-index:4;
  }
  #flash.burst{
    animation: burst .5s ease-out forwards;
  }

  #shockwave{
    position:absolute;
    left:50%;
    top:50%;
    width:10vmin;
    height:10vmin;
    border-radius:50%;
    border:2px solid rgba(185,242,255,.85);
    transform:translate(-50%,-50%) scale(.2);
    opacity:0;
    pointer-events:none;
    z-index:4;
    box-shadow:0 0 30px rgba(115,233,255,.35), inset 0 0 20px rgba(255,255,255,.45);
  }
  #shockwave.fire{
    animation: wave .85s cubic-bezier(.12,.78,.18,1) forwards;
  }

  #salt{
    position:absolute;
    left:50%;
    top:50%;
    width:min(42vw, 520px);
    max-height:78vh;
    object-fit:contain;
    transform:translate(-50%,-50%) scale(.42);
    opacity:0;
    z-index:5;
    pointer-events:none;
    filter:
      drop-shadow(0 0 28px rgba(203,245,255,.55))
      drop-shadow(0 0 78px rgba(102,212,255,.28));
    transition:transform 1s cubic-bezier(.16,.84,.22,1), opacity .45s ease;
  }
  #salt.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
  }

  #title{
    position:absolute;
    left:50%;
    top:78%;
    transform:translate(-50%, 18px);
    color:#eefaff;
    font-size: clamp(26px, 5vw, 70px);
    letter-spacing:.22em;
    text-transform:uppercase;
    font-weight:700;
    opacity:0;
    z-index:6;
    text-shadow:
      0 0 12px rgba(255,255,255,.5),
      0 0 28px rgba(115,233,255,.45),
      0 0 56px rgba(115,233,255,.22);
    transition: opacity .7s ease, transform .7s ease;
    white-space:nowrap;
  }
  #title.show{
    opacity:1;
    transform:translate(-50%, 0);
  }

  #controls{
    position:fixed;
    top:16px;
    right:16px;
    z-index:10;
    display:flex;
    gap:10px;
  }
  button{
    appearance:none;
    border:1px solid rgba(255,255,255,.16);
    background:rgba(5,12,22,.56);
    color:#eef8ff;
    padding:10px 14px;
    border-radius:999px;
    cursor:pointer;
    font-size:14px;
    letter-spacing:.02em;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,.25), inset 0 0 10px rgba(255,255,255,.04);
  }
  button:hover{
    background:rgba(10,20,35,.78);
  }

  @keyframes spin{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
  }
  @keyframes spinReverse{
    from{transform:translate(-50%,-50%) rotate(360deg)}
    to{transform:translate(-50%,-50%) rotate(0deg)}
  }
  @keyframes burst{
    0%{opacity:0}
    15%{opacity:1}
    100%{opacity:0}
  }
  @keyframes wave{
    0%{opacity:.9; transform:translate(-50%,-50%) scale(.25)}
    100%{opacity:0; transform:translate(-50%,-50%) scale(12)}
  }
</style>
</head>
<body>
<div id="intro">
  <canvas id="fx"></canvas>
  <div class="vortex" id="vortex"></div>
  <div id="energyCore"></div>
  <div id="flash"></div>
  <div id="shockwave"></div>

  <img id="sodium" class="hero" src="images/cards/sodium.png" alt="Sodium Hero" />
  <img id="chlorine" class="hero" src="images/cards/chlorine.png" alt="Chlorine Hero" />
  <img id="salt" src="images/cards/salt_formation.png" alt="Salt Formation" />

  <div id="title">ELEMENT HERO</div>

  <div id="controls">
    <button id="replayBtn">Watch Intro Again</button>
    <button id="skipBtn">Skip</button>
  </div>
</div>

<script>
(() => {
  const intro = document.getElementById('intro');
  const canvas = document.getElementById('fx');
  const ctx = canvas.getContext('2d');
  const vortex = document.getElementById('vortex');
  const sodium = document.getElementById('sodium');
  const chlorine = document.getElementById('chlorine');
  const salt = document.getElementById('salt');
  const title = document.getElementById('title');
  const energyCore = document.getElementById('energyCore');
  const flash = document.getElementById('flash');
  const shockwave = document.getElementById('shockwave');
  const replayBtn = document.getElementById('replayBtn');
  const skipBtn = document.getElementById('skipBtn');

  let w = 0, h = 0, cx = 0, cy = 0;
  let particles = [];
  let phase = 'idle';
  let introTimers = [];
  let rafId = null;
  let redirected = false;

  function resize(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = canvas.width = Math.floor(window.innerWidth * dpr);
    h = canvas.height = Math.floor(window.innerHeight * dpr);
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    cx = window.innerWidth / 2;
    cy = window.innerHeight / 2;
    seedParticles();
  }

  function rand(min,max){ return Math.random() * (max - min) + min; }

  function seedParticles(){
    particles = [];
    const count = Math.max(120, Math.floor((window.innerWidth * window.innerHeight) / 12000));
    for(let i=0;i<count;i++){
      const angle = rand(0, Math.PI * 2);
      const radius = rand(Math.min(window.innerWidth, window.innerHeight) * 0.18, Math.max(window.innerWidth, window.innerHeight) * 0.6);
      particles.push({
        orbit: radius,
        angle,
        speed: rand(0.0015, 0.006),
        size: rand(1.2, 3.8),
        alpha: rand(0.28, 0.95),
        hue: Math.random() < 0.6 ? 195 : 110,
        pull: rand(0.984, 0.994),
        x: cx + Math.cos(angle) * radius,
        y: cy + Math.sin(angle) * radius,
        drift: rand(-0.18, 0.18)
      });
    }
  }

  function resetState(){
    redirected = false;
    introTimers.forEach(clearTimeout);
    introTimers = [];
    phase = 'awakening';

    sodium.className = 'hero';
    chlorine.className = 'hero';
    salt.className = '';
    title.className = '';
    vortex.className = 'vortex';
    energyCore.className = '';
    flash.className = '';
    shockwave.className = '';

    sodium.style.left = '23%';
    chlorine.style.left = '77%';
    sodium.style.opacity = '';
    chlorine.style.opacity = '';
    salt.style.opacity = '';

    seedParticles();
  }

  function schedule(fn, ms){
    const id = setTimeout(fn, ms);
    introTimers.push(id);
  }

  function startIntro(){
    resetState();

    schedule(() => {
      vortex.classList.add('show');
    }, 120);

    schedule(() => {
      sodium.classList.add('show');
      chlorine.classList.add('show');
    }, 650);

    schedule(() => {
      phase = 'converge';
      sodium.classList.add('converge');
      chlorine.classList.add('converge');
      energyCore.classList.add('show');
    }, 2100);

    schedule(() => {
      phase = 'reaction';
      energyCore.classList.add('flash');
      flash.classList.add('burst');
      shockwave.classList.add('fire');
    }, 3350);

    schedule(() => {
      sodium.className = 'hero converge';
      chlorine.className = 'hero converge';
      sodium.style.opacity = '0';
      chlorine.style.opacity = '0';
      energyCore.style.opacity = '0';
      salt.classList.add('show');
      phase = 'result';
    }, 3720);

    schedule(() => {
      title.classList.add('show');
    }, 4300);

    schedule(() => {
      goMain();
    }, 5600);
  }

  function goMain(){
    if(redirected) return;
    redirected = true;
    window.location.href = 'main.html';
  }

  function skipIntro(){
    goMain();
  }

  function drawBackgroundGlow(){
    const g = ctx.createRadialGradient(cx, cy, 10, cx, cy, Math.min(window.innerWidth, window.innerHeight) * 0.45);
    g.addColorStop(0, 'rgba(170,235,255,0.13)');
    g.addColorStop(0.35, 'rgba(90,200,255,0.07)');
    g.addColorStop(0.68, 'rgba(80,255,160,0.03)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,window.innerWidth,window.innerHeight);
  }

  function animate(){
    ctx.clearRect(0,0,window.innerWidth,window.innerHeight);
    drawBackgroundGlow();

    for(const p of particles){
      if(phase === 'awakening'){
        p.angle += p.speed;
        p.x = cx + Math.cos(p.angle) * p.orbit;
        p.y = cy + Math.sin(p.angle) * p.orbit;
      } else if(phase === 'converge' || phase === 'reaction'){
        p.orbit *= p.pull;
        p.angle += p.speed * 1.8;
        p.x = cx + Math.cos(p.angle) * p.orbit + p.drift * 10;
        p.y = cy + Math.sin(p.angle) * p.orbit + p.drift * 6;
      } else if(phase === 'result'){
        p.orbit *= 1.003;
        p.angle += p.speed * 0.7;
        p.x = cx + Math.cos(p.angle) * p.orbit;
        p.y = cy + Math.sin(p.angle) * p.orbit;
      }

      const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
      const color = p.hue === 195
        ? `rgba(140,232,255,${p.alpha})`
        : `rgba(160,255,170,${p.alpha * 0.9})`;
      grd.addColorStop(0, color);
      grd.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 2.2, 0, Math.PI * 2);
      ctx.fill();
    }

    if(phase === 'converge' || phase === 'reaction'){
      ctx.strokeStyle = 'rgba(180,245,255,0.14)';
      ctx.lineWidth = 1;
      for(let i=0;i<18;i++){
        const a = (Date.now() * 0.0014 + i * 0.35);
        const r1 = 26 + i * 2.2;
        const r2 = 110 + i * 5.5;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
        ctx.lineTo(cx + Math.cos(a + 0.35) * r2, cy + Math.sin(a + 0.35) * r2);
        ctx.stroke();
      }
    }

    rafId = requestAnimationFrame(animate);
  }

  replayBtn.addEventListener('click', startIntro);
  skipBtn.addEventListener('click', skipIntro);
  window.addEventListener('resize', resize);

  resize();
  animate();
  startIntro();
})();
</script>
</body>
</html>
