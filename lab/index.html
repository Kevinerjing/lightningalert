<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chemistry Lab Arcade</title>
  <style>
    :root {
      --bg: #07141f;
      --panel: rgba(12, 27, 40, 0.92);
      --line: rgba(120, 196, 255, 0.16);
      --text: #ecf6ff;
      --muted: #a5c3d8;
      --amber: #ffbf47;
      --sky: #69d4ff;
      --lime: #b8f15d;
      --shadow: 0 22px 44px rgba(0, 0, 0, 0.34);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }

    body {
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(76, 151, 233, 0.22), transparent 28%),
        radial-gradient(circle at 15% 20%, rgba(184, 241, 93, 0.12), transparent 20%),
        linear-gradient(180deg, #091726 0%, var(--bg) 100%);
    }

    a { color: inherit; text-decoration: none; }

    .lab-shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 18px 48px;
    }

    .hero, .section {
      position: relative;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .hero::before,
    .hero::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(8px);
      z-index: 0;
    }

    .hero::before {
      width: 280px;
      height: 280px;
      top: -90px;
      right: -40px;
      background: radial-gradient(circle, rgba(255, 191, 71, 0.2), rgba(255, 191, 71, 0));
    }

    .hero::after {
      width: 240px;
      height: 240px;
      bottom: -100px;
      left: -40px;
      background: radial-gradient(circle, rgba(105, 212, 255, 0.18), rgba(105, 212, 255, 0));
    }

    .hero-content, .section > * { position: relative; z-index: 1; }

    .eyebrow {
      display: inline-flex;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--line);
      color: #d3ebff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1, h2, h3, p { margin: 0; }

    .hero h1 {
      margin: 18px 0 10px;
      font-size: clamp(2.3rem, 4vw, 4rem);
      line-height: 1;
    }

    .hero p,
    .section-header p,
    .lab-card p,
    .footer-note {
      color: var(--muted);
      line-height: 1.7;
    }

    .hero p { max-width: 760px; font-size: 1.05rem; }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 24px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 16px;
      border: 1px solid transparent;
      font-weight: 700;
      transition: transform 160ms ease;
    }

    .button:hover { transform: translateY(-2px); }

    .button.primary {
      color: #08131d;
      background: linear-gradient(135deg, #fff0a6, var(--amber));
      box-shadow: 0 16px 30px rgba(255, 191, 71, 0.2);
    }

    .button.secondary {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--line);
      color: var(--text);
    }

    .info-grid,
    .lab-grid {
      display: grid;
      gap: 16px;
    }

    .info-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      margin-top: 22px;
    }

    .info-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 20px;
      padding: 18px;
    }

    .info-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .section { margin-top: 22px; }
    .section-header h2 { font-size: 1.9rem; }
    .section-header p { margin-top: 10px; max-width: 760px; }

    .lab-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      margin-top: 20px;
    }

    .lab-card {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 300px;
      padding: 22px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background:
        radial-gradient(circle at top right, rgba(255, 255, 255, 0.08), transparent 35%),
        linear-gradient(180deg, rgba(19, 39, 56, 0.92), rgba(13, 28, 41, 0.98));
      transition: transform 180ms ease, border-color 180ms ease;
    }

    .lab-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 255, 255, 0.16);
    }

    .lab-card.metals {
      background:
        radial-gradient(circle at top right, rgba(255, 191, 71, 0.16), transparent 35%),
        linear-gradient(180deg, rgba(44, 31, 15, 0.7), rgba(16, 24, 35, 0.98));
    }

    .lab-card.gases {
      background:
        radial-gradient(circle at top right, rgba(105, 212, 255, 0.16), transparent 35%),
        linear-gradient(180deg, rgba(11, 43, 59, 0.78), rgba(14, 24, 38, 0.98));
    }

    .lab-badge {
      width: fit-content;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.06);
    }

    .lab-card h3 { font-size: 1.6rem; }

    .feature-list {
      display: grid;
      gap: 10px;
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .feature-list li {
      display: flex;
      gap: 10px;
      color: #dcebfa;
      line-height: 1.55;
    }

    .feature-list li::before {
      content: "";
      width: 10px;
      height: 10px;
      margin-top: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--amber), var(--lime));
      flex: none;
    }

    .footer-note { margin-top: 22px; text-align: center; }

    @media (max-width: 900px) {
      .info-grid, .lab-grid { grid-template-columns: 1fr; }
      .hero, .section { padding: 20px; }
    }

    @media (max-width: 640px) {
      .lab-shell { padding: 14px 12px 36px; }
      .hero-actions { flex-direction: column; }
      .button { width: 100%; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const LABS = [
      {
        id: "metals",
        title: "Metal and Non-metal Matching Lab",
        badge: "Property Lab",
        href: "./metal-nonmetal.html",
        className: "metals",
        description:
          "Students inspect sample properties like lustre, magnetism, malleability, and conductivity, then classify each sample like a real lab station.",
        features: [
          "Observation-table format with real material clues",
          "Immediate reasoning feedback after each answer",
          "Great for classification practice before formal notes"
        ]
      },
      {
        id: "gases",
        title: "Gas Lab Matching Game",
        badge: "Gas Test Lab",
        href: "./gas-lab.html",
        className: "gases",
        description:
          "Students watch animated gas tests, observe splint results, and decide whether the gas is hydrogen, oxygen, or carbon dioxide.",
        features: [
          "Watch-first interaction before guessing",
          "Visual splint and test-tube lab animation",
          "Reinforces classic gas test evidence"
        ]
      }
    ];

    function App() {
      return (
        <main className="lab-shell">
          <section className="hero">
            <div className="hero-content">
              <div className="eyebrow">Chemistry Lab Arcade</div>
              <h1>Choose a lab station and learn by testing.</h1>
              <p>
                This lab hub gives students two short chemistry games that feel more like interactive
                stations than worksheets. One focuses on metals versus non-metals. The other focuses on
                gas identification using classic lab observations.
              </p>

              <div className="hero-actions">
                <a className="button primary" href="./metal-nonmetal.html">Start Metals Lab</a>
                <a className="button secondary" href="./gas-lab.html">Start Gas Lab</a>
              </div>

              <div className="info-grid">
                <div className="info-card">
                  <strong>Short sessions</strong>
                  <span>Designed for quick classroom practice, review, or a warm-up at the start of a unit.</span>
                </div>
                <div className="info-card">
                  <strong>Evidence-based thinking</strong>
                  <span>Students use observations and lab clues instead of guessing from names alone.</span>
                </div>
                <div className="info-card">
                  <strong>Easy to reuse</strong>
                  <span>Each lab can be replayed for practice and discussion without setup friction.</span>
                </div>
              </div>
            </div>
          </section>

          <section className="section">
            <div className="section-header">
              <h2>Available Lab Games</h2>
              <p>
                Pick a station below. Each one is built as a focused mini-lab with observation, reasoning,
                and immediate feedback.
              </p>
            </div>

            <div className="lab-grid">
              {LABS.map((lab) => (
                <a key={lab.id} href={lab.href} className={`lab-card ${lab.className}`}>
                  <div className="lab-badge">{lab.badge}</div>
                  <h3>{lab.title}</h3>
                  <p>{lab.description}</p>
                  <ul className="feature-list">
                    {lab.features.map((feature) => (
                      <li key={feature}>{feature}</li>
                    ))}
                  </ul>
                  <div className="button primary">Open Lab</div>
                </a>
              ))}
            </div>

            <div className="footer-note">
              Built as static React pages inside the <code>lab</code> folder so they can run directly in this
              project without a separate build step.
            </div>
          </section>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
